# [models] binds each role to a model name. This is *which model runs that role*,
# not *whether that role runs*. Whether the critic role runs is decided by
# [critic] mode below.
[models]
orchestrator = "claude-opus"
planner = "gemini"
critic = "gemini"          # the model invoked when the critic role is dispatched
worker = "codex-gpt-5.5"
integrator = "codex-gpt-5.5"

[cli]
gemini = "python -m orch.gemini_sdk_runner"
codex = "codex"

[runtime]
max_workers = 1
default_timeout_seconds = 1800
max_retries = 2
poll_interval_seconds = 2

[sandbox]
mode = "docker"
docker = "docker"
image = "orchestra-sandbox:py3.12"
dockerfile = "docker/orchestra-sandbox.Dockerfile"
build_context = "."
network = "none"
workdir = "/workspace"

[budgets]
max_tasks_per_request = 5
max_wall_clock_minutes = 60

# [critic] decides who reviews worker diffs by default.
#   "opus"   → orchestrator (Claude Opus) self-reviews; task moves to self_review
#             and waits for a human-driven `orch chat` decision.
#   "gemini" → automatic critic dispatch to the [models] critic above.
#   "both"   → dispatch to gemini AND queue an opus self-review.
# A task may set `critic_override: gemini|both` to escalate, but cannot
# downgrade below the default mode.
[critic]
mode = "opus"

[chat]
model = "claude-opus-4-7"
